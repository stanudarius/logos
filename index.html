<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Logos — A highly cinematic microlearning platform." />
    <meta name="theme-color" content="#FAF8F3" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Logos">
    <link rel="apple-touch-icon" href="/icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,450;0,600;1,450;1,600&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
    <title>Logos</title>
  </head>
  <body>
    <div id="root">
      <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #FAF8F3; }
        #root-loader { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #FAF8F3; }
        .monogram-container { width: 64px; height: 64px; background: #F5F3ED; border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid #E8E4DC; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      </style>
      <div id="root-loader">
        <div class="monogram-container">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 36px; height: 36px;">
            <path d="M8 40 L24 8 L40 40" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
            <path d="M16 28 L34 28" stroke="#1C1C1E" stroke-width="2" stroke-linecap="round" opacity="0.5" />
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
